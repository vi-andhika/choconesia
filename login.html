<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk - ChocoNesia</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/login.css">
<link rel="icon" href="logo/cocoa-icon-fix-fix.png">
</head>
<body>
  <div class="cn-page">
    <div class="cn-bg-circle c1"></div>
    <div class="cn-bg-circle c2"></div>
    <div class="cn-dots d1">
      <div class="cn-dot"></div><div class="cn-dot"></div><div class="cn-dot"></div><div class="cn-dot"></div><div class="cn-dot"></div>
      <div class="cn-dot"></div><div class="cn-dot"></div><div class="cn-dot"></div><div class="cn-dot"></div><div class="cn-dot"></div>
      <div class="cn-dot"></div><div class="cn-dot"></div><div class="cn-dot"></div><div class="cn-dot"></div><div class="cn-dot"></div>
    </div>

    <div class="cn-brand">
      <div class="cn-brand-icon">♛</div>
      <span class="cn-brand-name">ChocoNesia</span>
    </div>
    <p class="cn-tagline">Premium Chocolate Since 2026</p>

    <div class="cn-card">
      <h1 class="cn-card-title">Masuk Akun</h1>
      <p class="cn-card-sub">Selamat datang kembali di ChocoNesia</p>

      <form id="loginForm">
        <label class="cn-label" for="email">Email</label>
        <input type="email" id="email" class="cn-input" placeholder="nama@email.com" required>

        <label class="cn-label" for="pw">Kata Sandi</label>
        <div class="cn-input-wrap">
          <input type="password" id="pw" class="cn-input" placeholder="Masukkan kata sandi" required>
          <button type="button" class="cn-eye" onclick="togglePw()" aria-label="Tampilkan kata sandi">
            <i class="ti ti-eye" id="eyeIco"></i>
          </button>
        </div>

        <div class="cn-row">
          <a class="cn-forgot" href="#">Lupa kata sandi?</a>
        </div>

        <button type="submit" class="cn-btn">Masuk →</button>
      </form>

      <div class="cn-divider">
        <div class="cn-div-line"></div>
        <span class="cn-div-txt">atau</span>
        <div class="cn-div-line"></div>
      </div>

      <button type="button" class="cn-btn-google">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Lanjutkan dengan Google
      </button>

      <p class="cn-signup">Belum punya akun? <a href="#">Daftar sekarang</a></p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
